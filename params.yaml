ingest:
  coin_id: bitcoin
  vs_currency: usd
  days: 365
  out_path: data/raw/btc_usd.csv

featurize:
  in_path: data/raw/btc_usd.csv
  out_path: data/processed/features.csv
  horizon: 1

train:
  features_path: data/processed/features.csv
  model: logreg
  test_frac: 0.2
  random_state: 42
  experiment_name: crypto-baseline
  registered_model_name: crypto_trend_baseline

lstm:
  seq_len: 10
  hidden_size: 64
  num_layers: 1
  dropout: 0.0
  lr: 0.001
  epochs: 50
  batch_size: 32

drift:
  features_path: data/processed/features.csv
  test_frac: 0.2
  test_window: 30
  p_val: 0.05

tune:
  features_path: data/processed/features.csv
  num_samples: 20
  max_concurrent_trials: 2
  metric: roc_auc
  mode: max
  test_frac: 0.2
  random_state: 42
  experiment_name: crypto-baseline
  registered_model_name: crypto_trend_baseline
