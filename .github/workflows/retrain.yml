name: Retrain

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      models:
        description: 'Models to train'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - logreg
          - rf
          - lstm

concurrency:
  group: retrain
  cancel-in-progress: true

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run DVC pipeline (ingest + featurize)
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            dvc repro && break
            echo "Failed, retrying in 30s..."
            sleep 30
          done

      - name: Train models
        run: |
          MODELS="${{ github.event.inputs.models || 'all' }}"
          if [ "$MODELS" = "all" ] || [ "$MODELS" = "logreg" ]; then
            python train.py --model logreg --no-register
          fi
          if [ "$MODELS" = "all" ] || [ "$MODELS" = "rf" ]; then
            python train.py --model rf --no-register
          fi
          if [ "$MODELS" = "all" ] || [ "$MODELS" = "lstm" ]; then
            python train.py --model lstm --no-register
          fi

      - name: Check drift
        id: drift
        continue-on-error: true
        run: |
          python scripts/check_drift.py
          echo "drift=false" >> "$GITHUB_OUTPUT"
        # exit 1 from check_drift.py means drift detected

      - name: Set drift status
        if: steps.drift.outcome == 'failure'
        run: echo "DRIFT_STATUS= (DRIFT DETECTED)" >> "$GITHUB_ENV"

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force dvc.lock models/metrics.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(retrain): daily pipeline run${DRIFT_STATUS:-} [skip ci]"
          git push
